<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ SEGURIDAD — Content Security Policy (H-1) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'sha256-T88w5HJrupyDeDMM8CcybETfwdlydOozMQr7qUsOnCQ=';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://avatars.githubusercontent.com;
        connect-src 'self' https://formsubmit.co https://github.com https://api.github.com;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self' https://formsubmit.co;
      "
    />

    <!-- ✅ SEGURIDAD — Security headers complementarios (H-8) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=(), payment=()"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jesús Millán — Analista de Sistemas & Desarrollador Frontend. Portfolio interactivo con métricas en tiempo real de GitHub." />
    <meta name="theme-color" content="#09090B" />
    <meta property="og:title" content="Jesús Millán | Dashboard Portfolio" />
    <meta property="og:description" content="Analista de Sistemas, especializado en diseño front end y Técnico en Administración." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jmillan.vercel.app/" />
    <meta property="og:image" content="https://jmillan.vercel.app/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jesús Millán | Dashboard Portfolio" />
    <meta name="twitter:description" content="Analista de Sistemas, especializado en diseño front end y Técnico en Administración." />
    <meta name="twitter:image" content="https://jmillan.vercel.app/og-preview.png" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://jmillan.vercel.app/" />

    <!-- Google Fonts: Inter + Fira Code -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />

    <title>Jesús Millán | Dashboard Portfolio</title>
  </head>
  <body>
    <!-- Anti-flash: apply theme before React hydrates -->
    <script>
      (function(){var t=localStorage.getItem('portfolio-theme');if(!t){t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}document.documentElement.classList.add(t)})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
